deploy:
  needs: docker-build
  runs-on: ubuntu-latest

  steps:
    - name: Deploy to VM
      uses: appleboy/ssh-action@v1.0.0

      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}

        script: |
          docker pull ${{ secrets.jeeva0312 }}/portfolio-website:latest

          docker stop app || true
          docker rm app || true

          docker run -d \
          --name app \
          -p 8080:80 \
          ${{ secrets.jeeva0312 }}/portfolio-website:latest