name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.jeeva0312 }}/portfolio-website:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.jeeva0312 }}/portfolio-website:latest

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}

          script: |
            docker pull ${{ secrets.jeeva0312 }}/portfolio-website:latest
            docker stop app || true
            docker rm app || true
            docker run -d --name app -p 8080:80 \
            ${{ secrets.jeeva0312 }}/portfolio-website:latest